id: consensus-feature
name: Consensus Feature
description: >
  Plan, implement, test, and review a feature using fan-out consensus. The
  implement step runs three coders in parallel (each in an isolated workspace);
  an LLM judge selects the best implementation and its workspace is promoted.
  The review step runs three reviewers in parallel and takes the majority
  approve/reject decision.
tags: [kind:feature]

entry: plan
exit: review
max_iterations: 3

nodes:
  - id: plan
    role: planner

  - id: implement
    fanout:
      count: 3
      branch:
        role: coder
        slots:
          toolchain: "{{ globals.task.toolchain }}"
      reduce:
        role: code-judge          # LLM judge selects the winning implementation
      max_parallel: 2             # at most two coders building at once

  - id: test
    role: tester
    slots:
      toolchain: "{{ globals.task.toolchain }}"

  - id: review
    fanout:
      count: 3
      branch:
        role: code-reviewer
        slots:
          toolchain: "{{ globals.task.toolchain }}"
      reduce:
        strategy: majority         # take the majority approve/reject decision
        key: approved
      max_parallel: 3

edges:
  - from: plan
    to: implement
  - from: implement
    to: test
  - from: test
    router:
      on: $test.output.passed
      branches:
        - when: true
          to: review
        - when: false
          to: implement
  - from: review
    router:
      on: $review.output.approved
      branches:
        - when: true
          to: end
        - when: false
          to: implement
