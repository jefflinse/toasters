id: python-scaffold
name: Python Project Scaffold
description: >
  Stand up a new Python project: pyproject.toml, virtual environment,
  package layout, and a runnable entry point. The scaffold goes through
  review so obvious structural mistakes are caught before downstream
  work begins.
tags: [kind:scaffold, language:python]

entry: scaffold
exit: review
max_iterations: 2

nodes:
  - id: scaffold
    role: py-init
  - id: review
    role: py-reviewer

edges:
  - from: scaffold
    to: review
  - from: review
    router:
      on: $review.output.approved
      branches:
        - when: true
          to: end
        - when: false
          to: scaffold
