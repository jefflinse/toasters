id: bug-fix
name: Bug Fix
description: >
  Investigate the bug, plan a fix, then implement and review it with fan-out
  consensus. The implement step runs multiple coders in parallel (each in an
  isolated workspace) and an LLM judge promotes the best fix; the review step
  runs focused reviewers in parallel (correctness, security, performance) and
  an aggregator folds their verdicts. Retries on test failure or review
  rejection, bounded by max_iterations.
tags: [kind:bugfix]

entry: investigate
exit: review
max_iterations: 3

nodes:
  - id: investigate
    role: investigator
  - id: plan
    role: planner
  - id: implement
    fanout:
      branches:                   # diverse consensus: two coders at different temperatures
        - role: coder
          temperature: 0.1        # conservative, close to the obvious fix
          slots:
            toolchain: "{{ task.toolchain }}"
        - role: coder
          temperature: 0.5        # exploratory, more likely to try a different approach
          slots:
            toolchain: "{{ task.toolchain }}"
      reduce:
        role: code-judge          # LLM judge selects the winning fix
      max_parallel: 2             # at most two coders building at once
  - id: test
    role: tester
    slots:
      toolchain: "{{ task.toolchain }}"
  - id: review
    fanout:
      branches:                   # responsibility fan-out: each reviewer owns one lens
        - role: lens-reviewer
          slots:
            toolchain: "{{ task.toolchain }}"
            lens: "{{ instructions.review-for-correctness }}"
        - role: lens-reviewer
          slots:
            toolchain: "{{ task.toolchain }}"
            lens: "{{ instructions.review-for-security }}"
        - role: lens-reviewer
          slots:
            toolchain: "{{ task.toolchain }}"
            lens: "{{ instructions.review-for-performance }}"
      reduce:
        role: review-aggregator   # synthesize the lens verdicts into one decision
      max_parallel: 3

edges:
  - from: investigate
    to: plan
  - from: plan
    to: implement
  - from: implement
    to: test
  - from: test
    router:
      on: $test.output.passed
      branches:
        - when: true
          to: review
        - when: false
          to: implement
  - from: review
    router:
      on: $review.output.approved
      branches:
        - when: true
          to: end
        - when: false
          to: implement
