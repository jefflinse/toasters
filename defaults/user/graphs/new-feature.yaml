id: new-feature
name: New Feature
description: >
  Plan, implement, test, and review a new feature using fan-out consensus. The
  implement step runs multiple coders in parallel (each in an isolated
  workspace); an LLM judge selects the best implementation and its workspace is
  promoted. The review step runs multiple reviewers in parallel and takes the
  majority approve/reject decision. Skips investigation — the task description
  is assumed sufficient for planning.
tags: [kind:feature]

entry: plan
exit: review
max_iterations: 3

nodes:
  - id: plan
    role: planner

  - id: implement
    fanout:
      branches:                   # diverse consensus: two coders at different temperatures
        - role: coder
          temperature: 0.1        # conservative, close to the obvious solution
          slots:
            toolchain: "{{ globals.task.toolchain }}"
        - role: coder
          temperature: 0.5        # exploratory, more likely to try a different approach
          slots:
            toolchain: "{{ globals.task.toolchain }}"
      reduce:
        role: code-judge          # LLM judge selects the winning implementation
      max_parallel: 2             # at most two coders building at once

  - id: test
    role: tester
    slots:
      toolchain: "{{ globals.task.toolchain }}"

  - id: review
    fanout:
      branches:                   # responsibility fan-out: each reviewer owns one lens
        - role: lens-reviewer
          slots:
            toolchain: "{{ globals.task.toolchain }}"
            lens: "Correctness: logic errors, off-by-one mistakes, nil/null dereferences, unhandled errors, and data races."
        - role: lens-reviewer
          slots:
            toolchain: "{{ globals.task.toolchain }}"
            lens: "Security: injection, path traversal, hardcoded secrets, unsafe operations, and missing input validation."
        - role: lens-reviewer
          slots:
            toolchain: "{{ globals.task.toolchain }}"
            lens: "Performance: unnecessary allocations, N+1 patterns, and redundant work in hot paths."
      reduce:
        role: review-aggregator   # synthesize the lens verdicts into one decision
      max_parallel: 3

edges:
  - from: plan
    to: implement
  - from: implement
    to: test
  - from: test
    router:
      on: $test.output.passed
      branches:
        - when: true
          to: review
        - when: false
          to: implement
  - from: review
    router:
      on: $review.output.approved
      branches:
        - when: true
          to: end
        - when: false
          to: implement
