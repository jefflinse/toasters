id: new-feature
name: New Feature
description: >
  Plan, implement, test, and review a new feature. Skips investigation —
  the task description is assumed to be sufficient for planning.
tags: [kind:feature]

entry: plan
exit: review
max_iterations: 3

nodes:
  - id: plan
    role: planner
  - id: implement
    role: coder
    slots:
      toolchain: "{{ globals.task.toolchain }}"
  - id: test
    role: tester
    slots:
      toolchain: "{{ globals.task.toolchain }}"
  - id: review
    role: code-reviewer
    slots:
      toolchain: "{{ globals.task.toolchain }}"

edges:
  - from: plan
    to: implement
  - from: implement
    to: test
  - from: test
    router:
      on: $test.output.passed
      branches:
        - when: true
          to: review
        - when: false
          to: implement
  - from: review
    router:
      on: $review.output.approved
      branches:
        - when: true
          to: end
        - when: false
          to: implement
