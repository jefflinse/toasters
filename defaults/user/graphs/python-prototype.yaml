id: python-prototype
name: Python Prototype
description: >
  Fast py-coder → py-tester loop capped at max_iterations. Skips
  investigation, planning, and review — good for quick Python
  iterations where correctness is pinned by tests.
tags: [kind:prototype, language:python]

entry: implement
max_iterations: 3

nodes:
  - id: implement
    role: py-coder
  - id: test
    role: py-tester

edges:
  - from: implement
    to: test
  - from: test
    router:
      on: $test.output.passed
      branches:
        - when: true
          to: end
        - when: false
          to: implement
