id: typescript-feature
name: TypeScript Feature
description: >
  Plan → implement → test → review for a new TypeScript feature. Skips
  investigation — the task description is assumed to be sufficient for
  planning. Uses ts-coder, ts-tester, and ts-reviewer.
tags: [kind:feature, language:typescript]

entry: plan
exit: review
max_iterations: 3

nodes:
  - id: plan
    role: planner
  - id: implement
    role: ts-coder
  - id: test
    role: ts-tester
  - id: review
    role: ts-reviewer

edges:
  - from: plan
    to: implement
  - from: implement
    to: test
  - from: test
    router:
      on: $test.output.passed
      branches:
        - when: true
          to: review
        - when: false
          to: implement
  - from: review
    router:
      on: $review.output.approved
      branches:
        - when: true
          to: end
        - when: false
          to: implement
