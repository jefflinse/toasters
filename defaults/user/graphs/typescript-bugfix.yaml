id: typescript-bugfix
name: TypeScript Bug Fix
description: >
  Full investigate → plan → implement → test → review cycle specialized
  for TypeScript. Uses ts-coder, ts-tester, and ts-reviewer so work
  carries TS idioms (strict types, async patterns, npm ecosystem).
  Retries on test failure or review rejection, bounded by
  max_iterations.
tags: [kind:bugfix, language:typescript]

entry: investigate
exit: review
max_iterations: 3

nodes:
  - id: investigate
    role: investigator
  - id: plan
    role: planner
  - id: implement
    role: ts-coder
  - id: test
    role: ts-tester
  - id: review
    role: ts-reviewer

edges:
  - from: investigate
    to: plan
  - from: plan
    to: implement
  - from: implement
    to: test
  - from: test
    router:
      on: $test.output.passed
      branches:
        - when: true
          to: review
        - when: false
          to: implement
  - from: review
    router:
      on: $review.output.approved
      branches:
        - when: true
          to: end
        - when: false
          to: implement
