id: tui-feature
name: TUI Feature
description: >
  Plan → implement → test → review for a new TUI feature built on
  Bubble Tea / Lipgloss. Uses tui-coder for implementation (pulls in
  the Bubble Tea toolchain on top of the Go toolchain) and
  go-tester / go-reviewer for the Go-idiom checks.
tags: [kind:feature, language:go, framework:bubbletea]

entry: plan
exit: review
max_iterations: 3

nodes:
  - id: plan
    role: planner
  - id: implement
    role: tui-coder
  - id: test
    role: go-tester
  - id: review
    role: go-reviewer

edges:
  - from: plan
    to: implement
  - from: implement
    to: test
  - from: test
    router:
      on: $test.output.passed
      branches:
        - when: true
          to: review
        - when: false
          to: implement
  - from: review
    router:
      on: $review.output.approved
      branches:
        - when: true
          to: end
        - when: false
          to: implement
