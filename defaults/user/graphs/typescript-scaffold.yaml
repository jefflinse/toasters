id: typescript-scaffold
name: TypeScript Project Scaffold
description: >
  Stand up a new TypeScript project: package.json, tsconfig, directory
  layout, and a runnable entry point. The scaffold goes through review
  so obvious structural mistakes are caught before downstream work
  begins.
tags: [kind:scaffold, language:typescript]

entry: scaffold
exit: review
max_iterations: 2

nodes:
  - id: scaffold
    role: ts-init
  - id: review
    role: ts-reviewer

edges:
  - from: scaffold
    to: review
  - from: review
    router:
      on: $review.output.approved
      branches:
        - when: true
          to: end
        - when: false
          to: scaffold
